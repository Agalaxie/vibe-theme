@vibe-file: templates/front-page.html
@purpose: Site front page — shown on the home URL when the reading setting is "latest posts" or a static page. Displays a full-width hero with the site title, tagline and a CTA, followed by the latest posts loop.
@safe-to-edit:
  - hero title, tagline, button text/link
  - gradient slug (defined in theme.json → settings.color.gradients)
  - number of posts shown below the hero
@do-not-touch:
  - the wp:template-part wrappers for header and footer
  - the wp:query block structure (WP injects real posts into it)
@prompt-examples:
  - "Change the hero gradient to a sunset orange"
  - "Add a second CTA button next to the first"
  - "Show 3 featured posts in a grid below the hero instead of 6 in a list"
-->
